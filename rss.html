<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>News Feed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      background: #f5f6f8;
    }
    .item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .title {
      font-size: 14px;
      font-weight: bold;
      color: #0078d4;
      text-decoration: none;
    }
    .title:hover {
      text-decoration: underline;
    }
    .date {
      font-size: 11px;
      color: gray;
      margin-top: 5px;
    }
  </style>
</head>

<body>
<div id="feed"></div>

<script>
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.schuttevaer.nl/feed/")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.items.slice(0,5).forEach(item => {
      html += `
        <div class="item">
          <a class="title" href="${item.link}" target="_blank">${item.title}</a>
          <div class="date">${new Date(item.pubDate).toLocaleDateString()}</div>
        </div>
      `;
    });
    document.getElementById("feed").innerHTML = html;
  });
</script>

</body>
</html>
